<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Gate Nexus</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <div class="logo">🛡️</div>
            <h2>V-GATE NEXUS</h2>
            <p>Identificación de Guardia</p>
            <input type="email" id="login-user" placeholder="Correo electrónico">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button id="btn-entrar">INICIAR SESIÓN</button>
        </div>
    </div>

    <div class="container hidden" id="app-content">
        <header>
            <div class="header-top">
                <div class="logo">🛡️</div>
                <h1>V-GATE NEXUS</h1>
            </div>
            <div class="agente-info">
                <span>Agente: <strong>Carlos Carvallo</strong></span>
                <button onclick="cerrarSesion()" class="btn-cerrar">🚪 CERRAR SESIÓN</button>
            </div>
        </header>

        <section class="registro-section">
            <div class="form-group">
                <input type="text" id="visitante-cedula" placeholder="Cédula de Identidad">
                <input type="text" id="visitante-nombre" placeholder="Nombre y Apellido">
                <input type="text" id="visitante-placa" placeholder="Placa Vehículo (Opcional)">
                <input type="text" id="visitante-destino" placeholder="Destino (Apto/Oficina)">
                <input type="text" id="visitante-motivo" placeholder="Motivo (Visita/Servicio)">
                <button id="btn-registrar">REGISTRAR ENTRADA</button>
            </div>
        </section>

        <section class="control-panel">
            <button id="btn-whatsapp" class="btn-whatsapp">🟢 ENVIAR REPORTE A WHATSAPP</button>
            
            <div class="buscar-fecha">
                <label>📅 Consultar historial por fecha:</label>
                <input type="date" id="filtro-fecha" onchange="consultarHistorial()">
            </div>

            <div class="tabs">
                <button id="tab-activos" class="tab-btn active" onclick="cambiarTab('activos')">EN INSTALACIONES</button>
                <button id="tab-historial" class="tab-btn" onclick="cambiarTab('historial')">HISTORIAL</button>
            </div>

            <div id="lista-activos" class="tab-content">
                </div>
            <div id="lista-historial" class="tab-content hidden">
                </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
