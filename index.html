<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Gate Nexus</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <div class="logo">🛡️</div>
            <h2>V-GATE NEXUS</h2>
            <p>Identificación de Guardia</p>
            <input type="text" id="login-user" placeholder="Correo">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button id="btn-entrar">INICIAR SESIÓN</button>
        </div>
    </div>

    <div class="container hidden" id="app-content">
        <header>
            <div class="logo">🛡️</div>
            <h1>V-GATE NEXUS</h1>
            <div class="agente-info">
                <input type="text" id="agente-nombre" value="Carlos Carvallo">
                <button onclick="cerrarSesion()" class="btn-minimal">Cerrar</button>
            </div>
        </header>

        <section class="registro-section">
            <div id="alerta-recurrente" class="hidden"></div>
            <div class="form-group">
                <input type="text" id="visitante-cedula" placeholder="Cédula">
                <input type="text" id="visitante-nombre" placeholder="Nombre y Apellido">
                <input type="text" id="visitante-placa" placeholder="Placa (Opcional)">
                <input type="text" id="visitante-destino" placeholder="Destino (Apto/Oficina)">
                <input type="text" id="visitante-motivo" placeholder="Motivo">
                <button id="btn-registrar">REGISTRAR ENTRADA</button>
            </div>
        </section>

        <section class="control-panel">
            <button id="btn-reporte" class="btn-secundario">📋 GENERAR REPORTE DEL DÍA</button>
            <div class="tabs">
                <button id="tab-activos" class="tab-btn active" onclick="cambiarTab('activos')">EN INSTALACIONES</button>
                <button id="tab-historial" class="tab-btn" onclick="cambiarTab('historial')">HISTORIAL</button>
            </div>
            <div id="lista-activos" class="tab-content"></div>
            <div id="lista-historial" class="tab-content hidden"></div>
            <button id="btn-mantenimiento" class="btn-minimal" style="margin-top:20px; opacity:0.5;">⚙️ Limpiar Base de Datos</button>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
