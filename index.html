<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator OS - Pro 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <button class="mobile-toggle" onclick="toggleSidebar()">
        <i class='bx bx-menu'></i>
    </button>

    <nav class="sidebar" id="sidebar">
        <header>
            <div class="logo-container">
                <i class='bx bxs-Layer-plus' style='color:#3b82f6; font-size: 30px;'></i>
                <span class="logo-text">CuratorOS</span>
            </div>
        </header>

        <div class="menu-content">
            <button onclick="gotoPage(this)" class="active">
                <i class='bx bx-home-alt'></i>
                <p>Dashboard</p>
            </button>

            <button onclick="openSubmenu(this)">
                <i class='bx bx-folder'></i>
                <p>Mis Proyectos</p>
                <i class='bx bx-chevron-down arrow'></i>
            </button>
            <div class="sub-menu">
                <ul>
                    <li><button onclick="gotoPage(this)"><p>Desarrollo Web</p></button></li>
                    <li><button onclick="gotoPage(this)"><p>Diseño UI/UX</p></button></li>
                    <li><button onclick="gotoPage(this)"><p>Inversiones</p></button></li>
                </ul>
            </div>

            <button onclick="openSubmenu(this)">
                <i class='bx bx-brain'></i>
                <p>Cerebro Digital</p>
                <i class='bx bx-chevron-down arrow'></i>
            </button>
            <div class="sub-menu">
                <ul>
                    <li><button onclick="gotoPage(this)"><p>Notas Rápidas</p></button></li>
                </ul>
            </div>
        </div>

        <div class="developer-footer" style="margin-top: auto; padding: 20px; font-size: 11px; color: rgba(255,255,255,0.3); border-top: 1px solid rgba(255,255,255,0.1);">
            Desarrollado por Carlos Carvallo
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <h1 id="current-category-title">Dashboard</h1>
        </header>

        <section id="content-area">
            <div class="card add-resource">
                <h3><i class='bx bx-plus-circle'></i> Nuevo Recurso (Nube)</h3>
                <div class="input-group">
                    <input type="text" id="link-title" placeholder="Nombre del recurso">
                    <input type="url" id="link-url" placeholder="URL (https://...)">
                    <select id="link-category" class="category-select">
                        <option value="Desarrollo Web">Desarrollo Web</option>
                        <option value="Diseño UI/UX">Diseño UI/UX</option>
                        <option value="Inversiones">Inversiones</option>
                        <option value="Notas Rápidas">Notas Rápidas</option>
                    </select>
                    <button onclick="saveResource()" class="btn-save">Guardar en Supabase</button>
                </div>
            </div>

            <div class="search-container">
                <i class='bx bx-search'></i>
                <input type="text" id="search-input" placeholder="Buscar en la base de datos..." onkeyup="filterBySearch()">
            </div>

            <div id="resources-list" class="grid-container"></div>
        </section>
    </main>

    <div id="qr-modal" class="modal-overlay" onclick="closeQRModal()">
        <div class="modal-content" style="text-align: center;" onclick="event.stopPropagation()">
            <h3 id="qr-title" style="margin-bottom: 15px;">Código QR</h3>
            <div id="qrcode" style="display: inline-block; background: white; padding: 10px; border-radius: 10px; margin-top: 15px;"></div>
            <button onclick="closeQRModal()" class="btn-save" style="margin-top: 20px; width: 100%;">Cerrar</button>
        </div>
    </div>

    <div id="toast" class="toast">¡Hecho!</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
